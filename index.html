<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Mams</title>
    <meta name="description" content="A heartfelt birthday letter for someone extraordinary." />

    <!-- Elegant web fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Page-load curtain for cinematic entrance -->
    <div class="page-curtain" id="page-curtain" aria-hidden="true"></div>

    <main class="experience">
      <section class="scroll-story" id="scroll-story" aria-label="A cinematic birthday letter experience">
        <div class="sticky-stage">
          <div class="scene-camera" id="scene-camera">
            <!-- Ambient light layers -->
            <div class="ambient ambient-left" aria-hidden="true"></div>
            <div class="ambient ambient-right" aria-hidden="true"></div>
            <div class="dust-layer" aria-hidden="true"></div>

            <!-- Floating light particles -->
            <canvas class="particle-canvas" id="particle-canvas" aria-hidden="true"></canvas>

            <!-- Wooden table -->
            <div class="table-wrap" aria-hidden="true">
              <div class="table-surface"></div>
              <div class="table-shadow"></div>
            </div>

            <!-- Main arrangement: flowers on left, envelope on stand to the right -->
            <div class="arrangement">
              <div class="arrangement-shadow" aria-hidden="true"></div>

              <!-- === FLOWERS + VASE (left-of-center) === -->
              <div class="bouquet-group">
                <svg
                  class="botanicals botanicals-back"
                  viewBox="0 0 560 780"
                  aria-hidden="true"
                  role="presentation"
                >
                  <defs>
                    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                      <stop offset="0%" stop-color="#4d6342" />
                      <stop offset="40%" stop-color="#5f7352" />
                      <stop offset="100%" stop-color="#7b8f6a" />
                    </linearGradient>
                    <linearGradient id="leafGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#8ca17a" />
                      <stop offset="100%" stop-color="#4a5e3d" />
                    </linearGradient>
                    <linearGradient id="leafGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="#7b9068" />
                      <stop offset="100%" stop-color="#3e5230" />
                    </linearGradient>
                    <!-- Rose colors: outer petals are darker, inner are lighter/blush -->
                    <radialGradient id="rOuter" cx="50%" cy="40%" r="55%">
                      <stop offset="0%" stop-color="#e8a5ad" />
                      <stop offset="100%" stop-color="#b05868" />
                    </radialGradient>
                    <radialGradient id="rMid" cx="50%" cy="40%" r="50%">
                      <stop offset="0%" stop-color="#f0bfc5" />
                      <stop offset="100%" stop-color="#c87080" />
                    </radialGradient>
                    <radialGradient id="rInner" cx="50%" cy="40%" r="45%">
                      <stop offset="0%" stop-color="#f8dde0" />
                      <stop offset="100%" stop-color="#dfa0a7" />
                    </radialGradient>
                    <radialGradient id="rCenter" cx="50%" cy="50%" r="50%">
                      <stop offset="0%" stop-color="#c06070" />
                      <stop offset="100%" stop-color="#7a2838" />
                    </radialGradient>
                    <filter id="softBotanicalShadow" x="-20%" y="-20%" width="140%" height="140%">
                      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#8d6a57" flood-opacity="0.15" />
                    </filter>
                  </defs>

                  <g filter="url(#softBotanicalShadow)">
                    <!-- ===== STEMS (10 stems reaching each rose center) ===== -->
                    <!-- Stem → Rose 1 at (178,155) -->
                    <path d="M278 700C274 600 252 440 220 320C200 240 188 190 178 155" fill="none" stroke="url(#stemGrad)" stroke-width="5" stroke-linecap="round" />
                    <!-- Stem → Rose 2 at (118,130) -->
                    <path d="M274 702C268 600 240 450 196 320C164 220 140 170 118 130" fill="none" stroke="url(#stemGrad)" stroke-width="4" stroke-linecap="round" />
                    <!-- Stem → Rose 3 (hero) at (286,90) -->
                    <path d="M282 704C284 600 286 460 286 340C286 240 286 160 286 90" fill="none" stroke="url(#stemGrad)" stroke-width="5" stroke-linecap="round" />
                    <!-- Stem → Rose 4 at (392,160) -->
                    <path d="M284 700C290 590 318 460 352 350C374 272 384 210 392 160" fill="none" stroke="url(#stemGrad)" stroke-width="4.5" stroke-linecap="round" />
                    <!-- Stem → Rose 5 at (442,200) -->
                    <path d="M290 700C296 600 330 480 372 370C404 286 424 240 442 200" fill="none" stroke="url(#stemGrad)" stroke-width="4.5" stroke-linecap="round" />

                    <path d="M280 706C278 620 264 500 248 400C236 330 228 280 220 230" fill="none" stroke="url(#stemGrad)" stroke-width="3.5" stroke-linecap="round" />
                    <!-- Stem → Rose 7 at (100,120) -->

                    <!-- Stem → Rose 8 at (460,168) -->
                    <path d="M292 702C298 580 340 430 394 310C426 244 446 200 460 168" fill="none" stroke="url(#stemGrad)" stroke-width="4" stroke-linecap="round" />

                      <path d="M140 200Q118 198 102 206" fill="none" stroke="#3e5230" stroke-width="0.7" opacity="0.25" />
                    </g>
                    <g opacity="0.68">
                      <path d="M420 240Q448 225 460 238Q456 258 438 268Q422 274 412 262Q408 252 420 240Z" fill="url(#leafGrad1)" />
                    </g>
                    <g opacity="0.65">
                      <path d="M160 340Q130 328 118 342Q122 362 142 370Q158 376 168 362Q170 352 160 340Z" fill="url(#leafGrad1)" />
                    </g>
                    <g opacity="0.62">
                      <path d="M400 350Q428 338 438 352Q432 370 414 378Q398 382 390 368Q388 358 400 350Z" fill="url(#leafGrad2)" />
                    </g>

                         creating a natural spiral rose look instead of symmetric star/daisy shapes. -->

                      <path d="M-1-6C-3-10 0-14 3-12C5-10 2-6-1-6Z" fill="#7a2838" opacity="0.6" />

                      <!-- Inner tight spiral -->
                      <path d="M-4 2C-14-6-16-20-8-26C0-30 12-22 12-12C12-4 2 4-4 2Z" fill="url(#rInner)" opacity="0.89" />
                      <path d="M6 0C14-8 14-22 6-26C-2-28-10-18-8-8C-6 0 4 2 6 0Z" fill="url(#rInner)" opacity="0.9" />
                      <path d="M0-6C-6-12-4-20 2-20C8-20 10-12 6-6C4-2 0-4 0-6Z" fill="url(#rInner)" opacity="0.88" />

                      <path d="M-2-8C-4-14 0-18 4-16C7-14 4-8-2-8Z" fill="#7a2838" opacity="0.55" />

                      <path d="M-7 8C-24 2-32-18-22-32C-12-40 4-34 10-22C14-12 6 6-7 8Z" fill="url(#rOuter)" opacity="0.76" />
                      <path d="M10 6C26-4 30-24 20-34C10-40-6-32-10-20C-14-10-2 8 10 6Z" fill="url(#rOuter)" opacity="0.78" />

                      <!-- Inner -->

                      <ellipse cx="0" cy="-6" rx="3" ry="3.5" fill="url(#rCenter)" opacity="0.85" />

                    <g transform="translate(220 230)">
                      <path d="M-5 4C-16-2-18-16-10-22C-2-28 8-20 10-12C10-4 2 6-5 4Z" fill="url(#rMid)" opacity="0.72" />

                      <!-- Mid -->

                      <path d="M4-2C8-8 6-14 0-16C-6-16-6-8-4-2C-2 2 2 0 4-2Z" fill="url(#rInner)" opacity="0.85" />
                      <ellipse cx="0" cy="-6" rx="3" ry="3.5" fill="url(#rCenter)" opacity="0.85" />

                    <!-- Rose 7: Medium, far left top -->
                    <g transform="translate(100 120)">
                      <path d="M-6 7C-20 0-26-16-18-26C-10-32 4-26 8-16C12-8 4 8-6 7Z" fill="url(#rOuter)" opacity="0.73" />
                      <path d="M8 5C22-4 24-22 14-30C4-34-8-24-10-14C-10-4 2 6 8 5Z" fill="url(#rOuter)" opacity="0.76" />

                      <path d="M4 0C12-6 12-18 4-22C-2-24-8-14-6-6C-4 0 2 2 4 0Z" fill="url(#rMid)" opacity="0.81" />
                      <!-- Inner -->

                  role="presentation"
                >
                  <path d="M310 660C302 560 308 460 336 330" fill="none" stroke="#7b9068" stroke-width="3.5" stroke-linecap="round" opacity="0.65" />
                  <path d="M254 660C260 580 272 480 294 360" fill="none" stroke="#6b8258" stroke-width="3" stroke-linecap="round" opacity="0.55" />
                  <path d="M310 360Q340 340 355 352Q352 372 334 382Q318 388 306 376Q300 368 310 360Z" fill="#8ca17a" opacity="0.6" />
                  <path d="M270 400Q242 388 230 398Q232 418 248 426Q262 432 272 420Q276 412 270 400Z" fill="#6b8258" opacity="0.55" />
                </svg>

                <!-- Glass vase -->
                <div class="vase" aria-hidden="true">
                  <div class="vase-highlight"></div>
                  <div class="vase-waterline"></div>
                  <div class="vase-reflection"></div>
                </div>
              </div>
              <!-- end bouquet-group -->

              <!-- === ENVELOPE ON WOODEN STAND (right-of-center) === -->
              <div class="envelope-stand-group">
                <!-- Small wooden easel/stand -->
                <div class="wooden-stand" aria-hidden="true">
                  <div class="stand-leg stand-leg-left"></div>
                  <div class="stand-leg stand-leg-right"></div>
                  <div class="stand-ledge"></div>
                  <div class="stand-back-support"></div>
                </div>

                <!-- The envelope assembly sits on the stand -->
                <div class="envelope-assembly" id="envelope">
                  <!-- Envelope back (behind everything) -->
                  <div class="envelope-back" aria-hidden="true"></div>

                  <!-- Letter clip zone -->
                  <div class="envelope-interior">
                    <article class="letter-sheet" aria-label="Birthday letter">
                      <div class="letter-inner">
                        <!--
                          ========================================
                          EDIT YOUR BIRTHDAY MESSAGE HERE
                          ========================================
                        -->
                        <h1>Happy Birthday Mams</h1>
                        <svg class="letter-flourish" viewBox="0 0 120 16" aria-hidden="true">
                          <path d="M10 8C20 4 30 12 40 8C50 4 55 12 60 8C65 4 70 12 80 8C90 4 100 12 110 8" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.35" />
                          <circle cx="60" cy="8" r="2" fill="currentColor" opacity="0.25" />
                        </svg>
                        <p>Dankie vir al die liefde, moeite en ondersteuning.</p>
                        <p>Ek is ongelooflik lief vir mamma.</p>
                        <p class="letter-signoff">-Armindo</p>
                        <!--
                          ========================================
                          END OF EDITABLE MESSAGE
                          ========================================
                        -->
                      </div>
                    </article>
                  </div>

                  <!-- Flap -->
                  <div class="envelope-flap" aria-hidden="true">
                    <div class="envelope-seal"></div>
                  </div>

                  <!-- Front fold panels -->
                  <div class="envelope-front" aria-hidden="true"></div>
                </div>

                <!-- Stand shadow on table -->
                <div class="stand-shadow" aria-hidden="true"></div>
              </div>
            </div>

            <div class="stage-vignette" aria-hidden="true"></div>
          </div>

          <!-- Scroll instruction -->
          <div class="scroll-hint" id="scroll-hint">
            <span>
              Scroll gently to open
              <svg class="scroll-chevron" viewBox="0 0 16 10" aria-hidden="true">
                <path d="M1 1L8 8L15 1" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
